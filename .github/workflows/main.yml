name: build-and-deploy-cv-web

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install pandoc and python
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc python3

      - name: Convert TeX CV to HTML with pandoc
        run: |
          mkdir -p public/cv
          cp -r CV/images public/cv/
          python3 clean.py

          pandoc public/cv/main.cleaned.tex \
            --from=latex \
            --to=html5 \
            --standalone \
            --metadata title="$(cat public/cv/title.txt)" \
            --metadata lang="en" \
            --output=public/cv/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/cv

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
